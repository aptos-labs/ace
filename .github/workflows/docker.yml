name: Docker / network-node

on:
  push:
    tags:
      - 'node/v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build (e.g. main, node/v0.1.0, abc1234)'
        required: false
        default: 'main'
      image_tag:
        description: 'Image tag to push (e.g. v0.1.0, main, dev). Defaults to short SHA.'
        required: false

jobs:
  build-and-push:
    name: Build and push network-node image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Derive image tag
        id: image_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.image_tag }}" ]; then
              echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            else
              echo "value=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            fi
          else
            # push: tags — strip node/ prefix
            echo "value=${GITHUB_REF_NAME#node/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: worker-components/network-node/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/network-node:${{ steps.image_tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
