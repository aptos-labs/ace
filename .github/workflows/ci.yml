name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-rust:
    name: Build Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: |
            target/debug/vss-dealer
            target/debug/vss-recipient
            target/debug/dkg-worker
            target/debug/dkr-src
            target/debug/dkr-dst
            target/debug/network-node
          retention-days: 1

  typecheck-scenarios:
    name: Typecheck / Scenarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install JS dependencies
        run: pnpm install
      - name: Typecheck
        run: pnpm --filter ace-scenarios typecheck

  unit-tests-ts:
    name: Unit tests / TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install JS dependencies
        run: pnpm install
      - name: Test
        run: pnpm --filter @aptos-labs/ace-sdk test -- --run

  unit-tests-rust:
    name: Unit tests / Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test

  unit-tests-move:
    name: Unit tests / Move
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo scripts/install-tools.sh
      - name: Test
        run: aptos move test --package-dir contracts/vss

  solana-example:
    name: scenario / solana-example
    needs: build-rust
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install JS dependencies
        run: pnpm install

      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: target/debug/

      - name: Make binaries executable
        run: chmod +x target/debug/*

      - name: Install tools
        run: sudo scripts/install-tools.sh && sudo scripts/install-solana-tools.sh

      - name: Cache Solana SBF platform tools
        uses: actions/cache@v4
        with:
          path: ~/.cache/solana
          key: solana-sbf-tools-${{ runner.os }}

      - name: Run solana-example
        env:
          ACE_SKIP_CARGO_BUILD: "1"
        run: pnpm --filter ace-scenarios test-solana-example

  custom-flow-solana:
    name: scenario / custom-flow-solana
    needs: build-rust
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install JS dependencies
        run: pnpm install

      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: target/debug/

      - name: Make binaries executable
        run: chmod +x target/debug/*

      - name: Install tools
        run: sudo scripts/install-tools.sh && sudo scripts/install-solana-tools.sh

      - name: Cache Solana SBF platform tools
        uses: actions/cache@v4
        with:
          path: ~/.cache/solana
          key: solana-sbf-tools-${{ runner.os }}

      - name: Run custom-flow-solana
        env:
          ACE_SKIP_CARGO_BUILD: "1"
        run: pnpm --filter ace-scenarios test-custom-flow-solana

  scenarios:
    name: scenario / ${{ matrix.scenario }}
    needs: build-rust
    strategy:
      matrix:
        scenario:
          - test-vss-protocol
          - test-vss-protocol-g2
          - test-dkg-protocol
          - test-dkg-protocol-g2
          - test-dkr-protocol
          - test-dkr-protocol-g2
          - test-network-protocol
          - test-network-protocol-shortsig
          - full-happy-path
          - test-access-failures
          - test-fault-tolerance
          - test-auto-epoch-change
          - large-committee
          - test-custom-flow-aptos
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install JS dependencies
        run: pnpm install

      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: target/debug/

      - name: Make binaries executable
        run: chmod +x target/debug/*

      - name: Install tools
        run: sudo scripts/install-tools.sh

      - name: Run ${{ matrix.scenario }}
        env:
          ACE_SKIP_CARGO_BUILD: "1"
        run: pnpm --filter ace-scenarios ${{ matrix.scenario }}
