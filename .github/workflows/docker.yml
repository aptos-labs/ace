name: Docker / network-node

on:
  push:
    tags:
      - 'node/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g. node/v0.1.0)'
        required: true

jobs:
  build-and-push:
    name: Build and push network-node image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve git tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Derive image version
        id: version
        run: |
          # node/v0.1.0 → v0.1.0
          echo "value=${TAG#node/}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.resolve.outputs.tag }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: worker-components/network-node/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/network-node:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/network-node:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
